<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>澳門天氣APP用戶意見調查分析報告（截至2026年5月19日數據）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    #pw-gate {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    #pw-gate.done { display: none; }
    #pw-gate .box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 40px 36px;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    #pw-gate .box .icon { font-size: 36px; margin-bottom: 12px; }
    #pw-gate .box h2 { color: #e2e8f0; font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    #pw-gate .box p { color: #94a3b8; font-size: 13px; margin-bottom: 22px; line-height: 1.5; }
    #pw-gate .box input {
      width: 100%; padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
      background: rgba(255,255,255,0.08); color: #e2e8f0;
      font-size: 15px; outline: none; text-align: center;
      letter-spacing: 2px; box-sizing: border-box;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #pw-gate .box input:focus { border-color: #4A90A4; }
    #pw-gate .box input::-moz-placeholder { color: #64748b; letter-spacing: 0; }
    #pw-gate .box input::placeholder { color: #64748b; letter-spacing: 0; }
    #pw-gate .box button {
      width: 100%; margin-top: 12px; padding: 12px;
      background: #4A90A4; color: white; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
      font-family: inherit;
    }
    #pw-gate .box button:hover { background: #3d7d8f; }
    #pw-gate .box .err { color: #f87171; font-size: 12px; margin-top: 10px; min-height: 18px; }
  </style>
  <script>
    var THE_PASSWORD = 'SMG2026';
    function tryLogin() {
      var input = document.getElementById('pwin');
      if (input.value === THE_PASSWORD) {
        document.getElementById('pw-gate').classList.add('done');
      } else {
        document.getElementById('pwerr').textContent = '密碼錯誤，請重試';
        input.value = '';
        input.focus();
      }
    }
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('pwin').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') tryLogin();
      });
    });
  </script>
  <script type="module" crossorigin src="/macau-weather-survey-report/assets/index-D2rWMf2w.js"></script>
  <link rel="stylesheet" crossorigin href="/macau-weather-survey-report/assets/index-FhRM_fIt.css">
</head>
<body>
  <div id="pw-gate">
    <div class="box">
      <div class="icon">🔒</div>
      <h2>內部工作文件</h2>
      <p>此報告僅供內部工作會議使用<br>請輸入密碼以繼續</p>
      <input id="pwin" type="password" placeholder="請輸入密碼" autofocus />
      <button onclick="tryLogin()">確 認</button>
      <div class="err" id="pwerr"></div>
    </div>
  </div>
  <div id="root"></div>
</body>
</html>
